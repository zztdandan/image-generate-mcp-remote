name: release

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  publish:
    name: Build and publish package
    runs-on: ubuntu-latest
    environment: pypi
    env:
      UV_PUBLISH_TOKEN: ${{ secrets.UV_PUBLISH_TOKEN }}
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install project dependencies
        run: uv sync --frozen --extra dev

      - name: Run tests before publish
        run: uv run pytest

      - name: Build distributions
        run: uv build --no-sources

      - name: Upload distributions to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber

      - name: Publish distributions to PyPI with token
        if: ${{ env.UV_PUBLISH_TOKEN != '' }}
        run: uv publish

      - name: Publish distributions to PyPI with trusted publishing
        if: ${{ env.UV_PUBLISH_TOKEN == '' }}
        run: uv publish
